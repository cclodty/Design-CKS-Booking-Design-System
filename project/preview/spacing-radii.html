<!doctype html>
<html lang="zh-Hant"><head><meta charset="utf-8"/>
<title>Radii</title>
<link rel="stylesheet" href="_card.css"/>
<style>
.r { flex:1; min-width:110px; background:#fff; border:1px solid var(--cks-line); padding:14px; display:grid; gap:8px; place-items:center;}
.box { width:64px; height:64px; background:#FFE4D6; border:1px solid #E86A4C;}
.lbl { font-weight:600; font-size:12.5px;}
.meta { font-family:var(--cks-font-mono); font-size:11px; color:var(--cks-fg3);}
</style></head>
<body><div class="card">
<h4>Corner Radii</h4>
<div class="row">
  <div class="r" style="border-radius:6px"><div class="box" style="border-radius:6px"></div><span class="lbl">Pill / Badge</span><span class="meta">6px</span></div>
  <div class="r" style="border-radius:8px"><div class="box" style="border-radius:8px"></div><span class="lbl">Input / Button</span><span class="meta">8px</span></div>
  <div class="r" style="border-radius:10px"><div class="box" style="border-radius:10px"></div><span class="lbl">Room Item / Slot</span><span class="meta">10px</span></div>
  <div class="r" style="border-radius:12px"><div class="box" style="border-radius:12px"></div><span class="lbl">Panel / Dialog</span><span class="meta">12px</span></div>
</div>
</div></body></html>
