<!doctype html>
<html lang="zh-Hant"><head><meta charset="utf-8"/>
<title>Empty &amp; Preview states</title>
<link rel="stylesheet" href="_card.css"/>
<style>
.empty { text-align:center; color:#93A0B6; padding:26px 10px; font-size:13px; background:#fff; border:1px solid #E8DDCD; border-radius:10px;}
.preview { border:1px dashed #D8CCBA; border-radius:12px; padding:26px 10px; text-align:center; color:#6f819d; font-size:13px; background:#fff;}
.selector { background:#FBF6EF; border:1px solid #D8CCBA; border-radius:10px; padding:12px; font-size:13px; color:#4A5A7A;}
</style></head>
<body><div class="card">
<h4>States · Empty / Preview / Selector</h4>
<div style="display:grid;gap:10px">
  <div class="empty">請在上方輸入姓名並點擊查詢</div>
  <div class="selector">📦 選擇要列印的課室（每列印一室一頁）— 已選：120、音樂室、美術室</div>
  <div class="preview">請至少勾選一個課室進行預覽與列印</div>
</div>
</div></body></html>
