<!doctype html>
<html lang="zh-Hant"><head><meta charset="utf-8"/>
<title>Inputs</title>
<link rel="stylesheet" href="_card.css"/>
<style>
.grid { display:grid; grid-template-columns:1fr 1fr; gap:20px 24px; padding-bottom: 4px;}
label { display:grid; gap:6px; font-size:12.5px; color:var(--cks-fg2); font-weight:600;}
input, select { width:100%; border:1px solid #D8CCBA; border-radius:8px; padding:10px; background:#fff; font-size:14px; font-family:var(--cks-font-sans); color:var(--cks-fg1);}
input:focus, select:focus { outline:0; border-color:#E86A4C; box-shadow:0 0 0 3px #FFE4D6;}
.seg { display:grid; grid-template-columns:repeat(3,1fr); gap:5px;}
.seg button { border:0; padding:7px; border-radius:6px; cursor:pointer; background:#EFE4D3; color:#4A5A7A; font-weight:600; font-size:13px;}
.seg button.active { background:#E86A4C; color:#fff;}
</style></head>
<body><div class="card">
<h4>Inputs &amp; Controls</h4>
<div class="grid">
  <label>日期<input type="date" value="2026-04-20"/></label>
  <label>搜尋<input type="search" placeholder="🔍 輸入名稱或室號搜尋..."/></label>
  <label>姓名 *<input placeholder="請輸入您的真實姓名"/></label>
  <label>預約類型<select><option>單次預約（僅限選擇的單日）</option></select></label>
  <label style="grid-column:1/-1">分段選擇
    <div class="seg"><button class="active">全部</button><button>課室</button><button>功能室</button></div>
  </label>
</div>
</div></body></html>
