<!doctype html>
<html lang="zh-Hant"><head><meta charset="utf-8"/>
<title>Iconography</title>
<link rel="stylesheet" href="_card.css"/>
<style>
.grid { display:grid; grid-template-columns:repeat(8, 1fr); gap:10px;}
.cell { background:#fff; border:1px solid #E8DDCD; border-radius:10px; padding:10px 6px; display:grid; place-items:center; gap:4px; font-size:11px; color:#6F7E99;}
.cell .ico { font-size:20px;}
</style></head>
<body><div class="card">
<h4>Iconography · Emoji functional system</h4>
<p style="margin:0 0 12px; font-size:12.5px; color:#6F7E99">Emoji are used as functional markers, prefixed to H2 section titles and action buttons. No custom SVG icons ship with the base system.</p>
<div class="grid">
  <div class="cell"><div class="ico">📅</div>選擇日期</div>
  <div class="cell"><div class="ico">🕘</div>自訂時間</div>
  <div class="cell"><div class="ico">🖨️</div>列印</div>
  <div class="cell"><div class="ico">📩</div>送出預約</div>
  <div class="cell"><div class="ico">🔎</div>查詢</div>
  <div class="cell"><div class="ico">⟳</div>重新整理</div>
  <div class="cell"><div class="ico">⬇</div>匯出</div>
  <div class="cell"><div class="ico">👤</div>使用者</div>
  <div class="cell"><div class="ico">👥</div>管理員</div>
  <div class="cell"><div class="ico">📘</div>Brand</div>
  <div class="cell"><div class="ico">📝</div>記錄</div>
  <div class="cell"><div class="ico">📚</div>課室</div>
  <div class="cell"><div class="ico">🕒</div>時段</div>
  <div class="cell"><div class="ico">📦</div>項目</div>
  <div class="cell"><div class="ico">✕</div>關閉</div>
  <div class="cell"><div class="ico">✓</div>完成</div>
</div>
</div></body></html>
