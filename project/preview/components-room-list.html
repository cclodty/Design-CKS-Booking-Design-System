<!doctype html>
<html lang="zh-Hant"><head><meta charset="utf-8"/>
<title>Room list</title>
<link rel="stylesheet" href="_card.css"/>
<style>
.list { display:grid; gap:8px; max-width:260px;}
.item { border:1px solid #D8CCBA; border-radius:10px; background:#fff; text-align:left; padding:10px 12px; color:var(--cks-fg1); cursor:pointer; display:grid; gap:3px;}
.item strong { font-size:14px; font-weight:700;}
.item small { color:var(--cks-fg3); font-size:12px;}
.item.active { background:#F28C6E; color:#fff; border-color:#F28C6E;}
.item.active small { color:#cfd9f5;}
.head { display:flex; align-items:center; justify-content:space-between; margin-bottom:6px;}
.count { background:#F1E6D8; color:#4A5A7A; border-radius:5px; padding:1px 7px; font-size:12px; font-weight:600;}
.h { font-size:13px; font-weight:700;}
</style></head>
<body><div class="card">
<h4>Room Item · List</h4>
<div class="list">
  <div class="head"><span class="h">可選課室 / 功能室</span><span class="count">7</span></div>
  <button class="item active"><strong>120</strong><small>功能室</small></button>
  <button class="item"><strong>219</strong><small>課室</small></button>
  <button class="item"><strong>圖書館會議室</strong><small>功能室 — A</small></button>
  <button class="item"><strong>音樂室</strong><small>功能室</small></button>
</div>
</div></body></html>
