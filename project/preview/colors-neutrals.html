<!doctype html>
<html lang="zh-Hant"><head><meta charset="utf-8"/>
<title>Neutrals</title>
<link rel="stylesheet" href="_card.css"/>
<style>
.sw { flex: 1 1 0; min-width: 130px; border-radius: 10px; overflow: hidden; border: 1px solid var(--cks-line); background: #fff; }
.sw .chip { height: 64px; }
.sw .meta { padding: 8px 10px; display: grid; gap: 2px; }
.sw .name { font-weight: 600; font-size: 12.5px; }
.sw .hex { font-family: var(--cks-font-mono); font-size: 11px; color: var(--cks-fg3); }
</style></head>
<body><div class="card">
<h4>Neutrals · Surfaces & Text</h4>
<div class="row">
  <div class="sw"><div class="chip" style="background:#22314F"></div><div class="meta"><span class="name">FG 1 (Text)</span><span class="hex">#22314F</span></div></div>
  <div class="sw"><div class="chip" style="background:#4A5A7A"></div><div class="meta"><span class="name">FG 2</span><span class="hex">#4A5A7A</span></div></div>
  <div class="sw"><div class="chip" style="background:#6F7E99"></div><div class="meta"><span class="name">FG 3 (Muted)</span><span class="hex">#6F7E99</span></div></div>
  <div class="sw"><div class="chip" style="background:#93A0B6"></div><div class="meta"><span class="name">FG 4 (Empty)</span><span class="hex">#8593A9</span></div></div>
  <div class="sw"><div class="chip" style="background:#E8DDCD"></div><div class="meta"><span class="name">Line</span><span class="hex">#E8DDCD</span></div></div>
  <div class="sw"><div class="chip" style="background:#F7F1EA"></div><div class="meta"><span class="name">Canvas BG</span><span class="hex">#F7F1EA</span></div></div>
  <div class="sw"><div class="chip" style="background:#ffffff"></div><div class="meta"><span class="name">Surface</span><span class="hex">#FFFFFF</span></div></div>
</div>
</div></body></html>
