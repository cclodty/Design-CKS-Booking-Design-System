<!doctype html>
<html lang="zh-Hant"><head><meta charset="utf-8"/>
<title>Typography</title>
<link rel="stylesheet" href="_card.css"/>
<style>
.spec { display: grid; grid-template-columns: 1fr auto; gap: 10px 16px; align-items: baseline; padding: 8px 0; border-bottom: 1px solid var(--cks-line); }
.spec:last-child { border-bottom: 0; }
.spec .meta { font-family: var(--cks-font-mono); font-size: 11px; color: var(--cks-fg3); }
</style></head>
<body><div class="card">
<h4>Type Scale · Noto Sans TC</h4>
<div class="spec"><div style="font-size:22px;line-height:28px;font-weight:700">課室及功能室預約系統</div><div class="meta">H1 · 22/28 · 700</div></div>
<div class="spec"><div style="font-size:18px;line-height:26px;font-weight:700">📅 選擇日期</div><div class="meta">H2 · 18/26 · 700</div></div>
<div class="spec"><div style="font-size:16px;line-height:24px;font-weight:700">可選課室 / 功能室</div><div class="meta">H3 · 16/24 · 700</div></div>
<div class="spec"><div style="font-size:14px;line-height:22px">請在上方輸入姓名並點擊查詢今天及未來的預約記錄。</div><div class="meta">Body · 14/22 · 400</div></div>
<div class="spec"><div style="font-size:13px;line-height:20px;color:#6F7E99">輸入您預約時填寫的姓名</div><div class="meta">Small · 13/20 · 400</div></div>
<div class="spec"><div style="font-size:12px;line-height:18px;color:#6F7E99">功能室 — A</div><div class="meta">Caption · 12/18 · 400</div></div>
</div></body></html>
