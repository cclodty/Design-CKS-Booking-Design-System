<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>課室預約 · CKS Room Booking — UI Kit</title>
<link rel="stylesheet" href="../../colors_and_type.css"/>
<style>
html, body { margin: 0; padding: 0; background: var(--cks-bg); }
body { font-family: var(--cks-font-sans); color: var(--cks-fg1); }
.cks-panel {
  background: var(--cks-surface);
  border: 1px solid var(--cks-line);
  border-radius: 16px;
  padding: 20px;
}
.cks-h1 { font-size: 22px; line-height: 28px; font-weight: 800; margin: 0; color: #22314F; }
.cks-h2 { font-size: 18px; line-height: 26px; font-weight: 700; margin: 0; color: #22314F; }
.cks-h3 { font-size: 15px; line-height: 22px; font-weight: 700; margin: 0; color: #22314F; }
input[type=checkbox] { accent-color: #E86A4C; }
table th, table td { font-family: var(--cks-font-sans); }

@keyframes cks-fade { from { opacity: 0 } to { opacity: 1 } }
@keyframes cks-slide { from { transform: translateX(32px); opacity: 0 } to { transform: translateX(0); opacity: 1 } }
@keyframes cks-toast { from { transform: translate(-50%, 10px); opacity: 0 } to { transform: translate(-50%, 0); opacity: 1 } }
@keyframes cks-pop   { from { transform: scale(.96); opacity: 0 } to { transform: scale(1); opacity: 1 } }

@media (max-width: 900px) {
  main > div[style*="grid-template-columns"] { grid-template-columns: 1fr !important; }
}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="MyBookingsView.jsx"></script>
<script type="text/babel" src="BookingView.jsx"></script>
<script type="text/babel" src="PrintView.jsx"></script>
<script type="text/babel" src="AdminView.jsx"></script>
<script type="text/babel" src="App.jsx"></script>
<script type="text/babel">
  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
